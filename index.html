<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>秋天的英语学习计划 | v56.1 实战加强版</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --accent: #00d4ff;
            --text: #c9d1d9; --sec: #8b949e; --success: #238636;
            --warn: #d29922; --border: #30363d; --critical: #f85149;
            --gradient: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 12px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 800px; padding-bottom: 30px; }
        header h1 { text-align: center; color: var(--accent); font-weight: 300; font-size: 1.4rem; margin-bottom: 10px; }
        
        .clock-box { text-align: center; margin-bottom: 15px; font-family: monospace; }
        #liveClock { font-size: 1.6rem; color: var(--accent); font-weight: bold; }
        #liveDate { font-size: 0.75rem; color: var(--sec); }

        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-item { background: #000; border: 1px solid var(--border); padding: 10px 5px; border-radius: 6px; text-align: center; }
        .stat-item .val { display: block; font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; }
        .stat-item .lab { font-size: 0.55rem; color: var(--sec); display: block; margin-bottom: 5px;}
        .pg-bg { background: #333; height: 4px; width: 80%; margin: 0 auto; border-radius: 2px; overflow: hidden; }
        .pg-fill { background: var(--success); height: 100%; width: 0%; transition: width 0.5s; }

        .tool-bar { background: #1a1d23; padding: 12px; border-radius: 6px; margin-bottom: 10px; border: 1px dashed var(--accent); }
        .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
        .sync-input { background: #000; border: 1px solid var(--border); color: var(--success); padding: 8px; border-radius: 4px; flex: 1; outline:none; font-size: 13px; text-align: center; }
        .btn-tool { padding: 10px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 0.75rem; color: white; flex: 1; min-width: 80px; }

        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        .input-row { display: flex; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        input { background: transparent; border: none; padding: 14px; color: #fff; outline: none; flex: 1; font-size: 16px; min-width: 100px; }
        .search-row { background: rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid var(--border); }
        .search-row input { padding: 10px; font-size: 14px; color: var(--accent); }
        
        .btn-tran { background: #21262d; color: var(--accent); border: none; border-left: 1px solid var(--border); padding: 0 15px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
        
        .cat-tabs { display: flex; gap: 6px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { flex: 1; min-width: 75px; padding: 10px 2px; background: var(--card); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; text-align: center; white-space: nowrap; }
        .tab-btn.active { border-color: var(--accent); background: rgba(0, 212, 255, 0.1); }
        .tab-btn b { display: block; font-size: 1.1rem; }
        .tab-btn span { font-size: 0.6rem; color: var(--sec); }

        .word-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 12px; padding: 15px; position: relative; transition: all 0.3s; }
        .en-txt { font-size: 1.3rem; font-weight: bold; color: var(--accent); display: block; word-break: break-all; }
        .zh-txt { font-size: 0.95rem; color: var(--sec); display: block; margin-top: 4px; }
        /* 新增：实战短句样式 */
        .ex-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .ex-txt { font-size: 1rem; color: #f093fb; font-style: italic; display: block; }
        .ez-txt { font-size: 0.85rem; color: var(--sec); display: block; margin-top: 2px; }
        
        .stage-badge { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid var(--accent); }
        .quiz-wrapper { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
        .quiz-in { background: #000; border-bottom: 2px solid var(--accent); border-top:none; border-left:none; border-right:none; color: var(--accent); font-size: 18px; flex: 1; outline: none; padding: 8px; border-radius: 0; }
        
        .btn-listen { background: #58a6ff; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-listen.active { background: var(--critical); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-confirm-sm { background: var(--border); color: var(--sec); border: none; padding: 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }
        .transcript-hint { font-size: 0.8rem; color: var(--warn); font-style: italic; min-height: 1.2rem; }
        
        .act-group { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px; flex-wrap: wrap; }
        .i-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); cursor: pointer; font-size: 0.75rem; padding: 6px 10px; border-radius: 4px; display: flex; align-items: center; gap: 4px; }
        .i-btn:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    <header><h1>秋天的英语学习计划</h1></header>
    <div class="clock-box">
        <div id="liveClock">00:00:00</div>
        <div id="liveDate">2026年03月27日</div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="lab">今日目标</span><span class="val" id="d_val">0</span><div class="pg-bg"><div class="pg-fill" id="d_pg"></div></div></div>
        <div class="stat-item"><span class="lab">本周目标</span><span class="val" id="w_val">0</span><div class="pg-bg"><div class="pg-fill" id="w_pg"></div></div></div>
        <div class="stat-item"><span class="lab">月度目标</span><span class="val" id="m_val">0</span><div class="pg-bg"><div class="pg-fill" id="m_pg"></div></div></div>
    </div>

    <div class="tool-bar">
        <div class="row">
            <input type="password" id="syncId" class="sync-input" placeholder="Token 加密存储" readonly>
            <button onclick="App.sync('push')" class="btn-tool" style="background:var(--success)">💾 云端备份</button>
            <button onclick="App.sync('pull')" class="btn-tool" style="background:var(--accent); color:black">📥 下载同步</button>
        </div>
        <div class="row" style="margin-bottom:0; border-top: 1px solid #30363d; padding-top: 8px;">
            <button onclick="App.exportJSON()" class="btn-tool" style="background:#444">📤 导出</button>
            <button onclick="App.importJSON(this)" class="btn-tool" style="background:#444">📥 导入</button>
            <input type="file" id="fileIn" style="display:none" onchange="App.importJSON(this)">
            <button onclick="generatePoster()" class="btn-tool" style="background:var(--gradient)">📸 战报</button>
        </div>
    </div>

    <div class="panel">
        <div class="input-row">
            <input type="text" id="eIn" placeholder="单词 (Word)">
            <button class="btn-tran" onclick="App.translate('word')">🌐 翻译单词</button>
            <input type="text" id="zIn" placeholder="中文含义">
        </div>
        <div class="input-row" style="background: rgba(0, 212, 255, 0.03);">
            <input type="text" id="exIn" placeholder="实战短句 (Practical Sentence)">
            <button class="btn-tran" onclick="App.translate('sentence')" style="color:#f093fb">🌐 翻译短句</button>
            <input type="text" id="ezIn" placeholder="短句翻译">
        </div>
        <div class="search-row">
            <input type="text" id="sIn" placeholder="🔍 搜索词库..." oninput="App.render()">
        </div>
        <button class="btn-main" onclick="App.addWord()">💾 存入学习库</button>
    </div>

    <div class="cat-tabs" id="catTabs"></div>
    <div id="listView"></div>
</div>

<script>
    const App = {
        STAGES: [0, 30, 720, 1440, 2880, 5760, 10080, 20160],
        PLAN: { d: 10, w: 70, m: 300 },
        GIST_ID: "682503e0daf82738d418a9731bef4302", 
        words: JSON.parse(localStorage.getItem('autumn_plan_v50')) || [],
        activeTab: 'new',
        recognition: null,

        init() {
            setInterval(() => this.tick(), 1000);
            this.initSpeech();
            this.render();
            this.updateTokenDisplay();
        },

        initSpeech() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (Speech) {
                this.recognition = new Speech();
                this.recognition.lang = 'en-US';
                this.recognition.continuous = false;
                this.recognition.interimResults = false;
            }
        },

        updateTokenDisplay() {
            const token = localStorage.getItem('gh_token_v51');
            document.getElementById('syncId').value = token ? "********" : "未绑定";
        },

        async getAuthToken() {
            let token = localStorage.getItem('gh_token_v51');
            if (!token) {
                token = prompt("请输入 GitHub Token:");
                if (token) { localStorage.setItem('gh_token_v51', token.trim()); this.updateTokenDisplay(); }
            }
            return token;
        },

        tick() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('zh-CN', {hour12:false});
            document.getElementById('liveDate').innerText = now.toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric',weekday:'long'});
        },

        async translate(mode) {
            const e = document.getElementById(mode==='word'?'eIn':'exIn');
            const z = document.getElementById(mode==='word'?'zIn':'ezIn');
            const q = e.value.trim() || z.value.trim();
            if(!q) return;
            const isEn = /[a-zA-Z]/.test(q);
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${isEn?'zh-CN':'en'}&dt=t&q=${encodeURIComponent(q)}`);
                const data = await res.json();
                if(isEn) z.value = data[0][0][0]; else e.value = data[0][0][0];
            } catch (err) { alert("翻译繁忙"); }
        },

        addWord() {
            const e = document.getElementById('eIn').value.trim(), 
                  z = document.getElementById('zIn').value.trim(),
                  ex = document.getElementById('exIn').value.trim(),
                  ez = document.getElementById('ezIn').value.trim();
            if(!e || !z) return;
            
            const isDuplicate = this.words.some(w => w.e.toLowerCase() === e.toLowerCase());
            if (isDuplicate) { alert(`⚠️ 单词 "${e}" 已在库中。`); return; }
            
            this.words.push({ id: Date.now(), e, z, ex, ex_z: ez, s: 0, c: 0, n: null, m_t: null });
            this.save(); this.render();
            ['eIn', 'zIn', 'exIn', 'ezIn'].forEach(id => document.getElementById(id).value = '');
        },

        save() { localStorage.setItem('autumn_plan_v50', JSON.stringify(this.words)); },

        render() {
            const now = Date.now();
            const startOfD = new Date().setHours(0,0,0,0);
            const startOfW = new Date(now - (new Date().getDay()||7-1)*86400000).setHours(0,0,0,0);
            const startOfM = new Date(new Date().getFullYear(), new Date().getMonth(), 1).getTime();
            const kw = document.getElementById('sIn').value.toLowerCase().trim();

            let cats = { new: [], wait: [], monitor: [], master: [] };
            let count = { d: 0, w: 0, m: 0 };

            this.words.forEach(w => {
                if(kw && !(w.e.toLowerCase().includes(kw) || w.z.includes(kw))) return;
                if(w.s >= this.STAGES.length) {
                    if(w.m_t >= startOfD) count.d++;
                    if(w.m_t >= startOfW) count.w++;
                    if(w.m_t >= startOfM) count.m++;
                    cats.master.push(w);
                } else {
                    if(w.n === null) cats.new.push(w);
                    else if(now >= w.n) cats.wait.push(w);
                    else cats.monitor.push(w);
                }
            });

            const updateUI = (key, cur, tar) => {
                document.getElementById(`${key}_val`).innerText = cur;
                document.getElementById(`${key}_pg`).style.width = Math.min((cur/tar)*100, 100) + '%';
            };
            updateUI('d', count.d, this.PLAN.d);
            updateUI('w', count.w, this.PLAN.w);
            updateUI('m', count.m, this.PLAN.m);

            const config = [{id:'new',l:'新词'}, {id:'wait',l:'待学'}, {id:'monitor',l:'监测'}, {id:'master',l:'掌握'}];
            document.getElementById('catTabs').innerHTML = config.map(c => `
                <div class="tab-btn ${this.activeTab===c.id?'active':''}" onclick="App.activeTab='${c.id}';App.render();">
                    <b>${cats[c.id].length}</b><span>${c.l}</span>
                </div>
            `).join('');
            document.getElementById('listView').innerHTML = cats[this.activeTab].map(w => this.buildCard(w)).join('');
        },

        buildCard(w) {
            const isFinal = (w.s === this.STAGES.length - 1);
            const stageName = isFinal ? "🏆 终极默写" : `🗣️ 阶段 ${w.s + 1} (${w.c + 1}/10)`;
            
            let exHtml = w.ex ? `<div class="ex-box"><span class="ex-txt">${w.ex}</span><span class="ez-txt">${w.ex_z || ''}</span></div>` : '';
            let content = '';

            if (this.activeTab === 'new' || this.activeTab === 'wait') {
                if (isFinal) {
                    content = `<span class="en-txt" style="color:var(--text);">${w.z}</span>
                               <div class="quiz-wrapper">
                                   <input class="quiz-in" id="q-${w.id}" placeholder="拼写单词..." onkeydown="if(event.keyCode==13) App.check(${w.id}, false)">
                                   <button class="btn-main" onclick="App.check(${w.id}, false)">提交默写</button>
                               </div>`;
                } else {
                    content = `<span class="en-txt">${w.e}</span><span class="zh-txt">${w.z}</span>${exHtml}
                               <div class="quiz-wrapper">
                                   <div class="transcript-hint" id="t-${w.id}">大声朗读单词以通过检测...</div>
                                   <button class="btn-listen" id="btn-L-${w.id}" onclick="App.startListening(${w.id})">🎤 开始识别</button>
                                   <button class="btn-confirm-sm" onclick="App.check(${w.id}, true)">识别失败？手动确认已读准</button>
                               </div>`;
                }
            } else {
                const diff = w.n - Date.now();
                const timeStr = diff > 0 ? `${Math.floor(diff/60000)}m后` : '逾期';
                content = `<span class="en-txt">${w.e}</span><span class="zh-txt">${w.z}</span>${exHtml}
                           <div style="margin-top:8px; font-size:0.7rem; color:var(--accent)">⏲️ ${this.activeTab==='monitor'?timeStr:'永久掌握'}</div>`;
            }

            return `<div class="word-card"><div class="stage-badge">${stageName}</div>
                ${content}
                <div class="act-group">
                    <button class="i-btn" onclick="App.say('${w.e}')">🔊 单词</button>
                    ${w.ex ? `<button class="i-btn" onclick="App.say('${w.ex.replace(/'/g,"\\'")}')">🔊 短句</button>` : ''}
                    <button class="i-btn" style="color:var(--critical);margin-left:auto" onclick="App.del(${w.id})">🗑️</button>
                </div></div>`;
        },

        startListening(id) {
            if (!this.recognition) return alert("当前浏览器不支持语音识别");
            const word = this.words.find(w => w.id === id);
            const btn = document.getElementById(`btn-L-${id}`);
            const hint = document.getElementById(`t-${id}`);
            this.recognition.onstart = () => { btn.classList.add('active'); btn.innerText = "🔴 倾听中..."; };
            this.recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,!?;]/g, "").trim();
                hint.innerText = `听到: "${transcript}"`;
                if (transcript.includes(word.e.toLowerCase().trim())) {
                    hint.style.color = "var(--success)";
                    setTimeout(() => App.check(id, true), 800);
                } else {
                    hint.style.color = "var(--critical)";
                    btn.innerText = "🎤 再试一次";
                }
            };
            this.recognition.onerror = () => { btn.classList.remove('active'); };
            this.recognition.start();
        },

        check(id, isReadMode) {
            const word = this.words.find(w => w.id === id);
            if (!isReadMode) {
                const input = document.getElementById(`q-${id}`);
                if (input.value.toLowerCase().trim() !== word.e.toLowerCase().trim()) {
                    input.style.borderBottomColor = 'var(--critical)';
                    return;
                }
                word.s++; word.m_t = Date.now();
            } else {
                this.say(word.e);
                word.c++;
                if (word.c >= 10) { word.c = 0; word.s++; word.n = Date.now() + this.STAGES[word.s] * 60000; }
                else { word.n = Date.now() + 1 * 60000; }
            }
            this.save(); this.render();
        },

        async sync(type) {
            const token = await this.getAuthToken();
            if(!token) return;
            const url = `https://api.github.com/gists/${this.GIST_ID}`;
            try {
                if(type === 'push') {
                    await fetch(url, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: { "words.json": { content: JSON.stringify(this.words) } } })
                    });
                    alert("✅ 备份成功");
                } else {
                    const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                    const data = await res.json();
                    if(data.files["words.json"]) { 
                        const remoteData = JSON.parse(data.files["words.json"].content);
                        const existingLower = this.words.map(w => w.e.toLowerCase());
                        const newData = remoteData.filter(w => !existingLower.includes(w.e.toLowerCase()));
                        this.words = [...this.words, ...newData];
                        this.save(); this.render(); 
                        alert(`✅ 同步完成！新增 ${newData.length} 词。`); 
                    }
                }
            } catch(e) { alert("同步失败"); }
        },

        exportJSON() {
            const blob = new Blob([JSON.stringify(this.words)], {type: "application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `词库_${new Date().toISOString().slice(0,10)}.json`; a.click();
        },

        importJSON(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) {
                        const existingLower = this.words.map(w => w.e.toLowerCase());
                        const newWords = data.filter(w => !existingLower.includes(w.e.toLowerCase()));
                        this.words = [...this.words, ...newWords];
                        this.save(); this.render();
                        alert(`✅ 导入新增: ${newWords.length}`);
                    }
                } catch(err) { alert("导入失败"); }
            };
            if(input.files && input.files[0]) reader.readAsText(input.files[0]);
            else document.getElementById('fileIn').click();
        },

        say(t) { 
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t); m.lang='en-US'; m.rate = 0.9;
            window.speechSynthesis.speak(m); 
        },
        del(id) { if(confirm('删除?')) { this.words = this.words.filter(w=>w.id!==id); this.save(); this.render(); }}
    };

    async function generatePoster() {
        const area = document.getElementById('captureArea');
        const canvas = await html2canvas(area, { backgroundColor: '#0d1117', scale: 2 });
        const link = document.createElement('a'); link.download = `战报.png`;
        link.href = canvas.toDataURL(); link.click();
    }
    App.init();
</script>
</body>
</html>
